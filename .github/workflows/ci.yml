name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Parser Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run parser validation tests
        run: make test

  build:
    name: Build Plugin
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: test  # Only build if tests pass

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Flipper toolchain
        uses: actions/cache@v4
        with:
          path: ~/.ufbt/toolchain
          key: flipper-toolchain-${{ runner.os }}-v2
          restore-keys: |
            flipper-toolchain-${{ runner.os }}-

      - name: Install uFBT
        run: python -m pip install ufbt SCons ansi

      - name: Build Bambu parser plugin
        run: ufbt

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: bambu_parser
          path: dist/bambu_parser.fal
          retention-days: 30
